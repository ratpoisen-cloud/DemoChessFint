<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fentanyl Chess">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#1a1c1a">
    <title>Fentanyl Chess Online</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Специальные стили для iOS */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        
        button, .btn, input, textarea {
            -webkit-appearance: none;
            appearance: none;
            border-radius: 0;
        }
        
        /* Улучшение производительности на iOS */
        .turn-indicator.my-turn {
            will-change: opacity;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        
        #myBoard {
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            touch-action: manipulation;
        }
        
        /* Предотвращение скролла при таче на доске */
        .chessboard {
            touch-action: none;
        }
        
        /* Улучшение читаемости на iOS */
        .move-list-content {
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
        }
        
        /* Исправление бага с z-index на iOS */
        .confirm-overlay, .modal {
            -webkit-transform: translateZ(1000px);
            transform: translateZ(1000px);
        }
        
        /* Плавный скролл */
        .games-grid, .move-list-content {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>
    <div class="main-container">

        <div class="top-bar">
            <div id="user-info" class="hidden">
                <img id="user-photo" src="" alt="avatar">
                <span id="user-name"></span>
                <button id="logout-btn" class="btn btn-outline">Выйти</button>
            </div>
            <div id="auth-buttons" class="auth-group">
                <button id="login-google" class="btn btn-primary">Google</button>
                <button id="login-email-trigger" class="btn btn-outline">Email</button>
            </div>
        </div>

        <div id="lobby-section" class="card hidden">
            <h1 class="section-title">Мои партии</h1>
            <div id="games-list" class="games-grid">Загрузка ваших игр...</div>
            <button id="create-game-btn" class="btn btn-primary btn-large">Создать новую игру</button>
        </div>

        <div id="game-section" class="hidden">
            <div class="game-layout">
                <div class="board-area">
                    <div class="status-box">
                        <div id="status" class="status-text">Ожидание хода...</div>
                        <div id="user-color" class="badge"></div>
                        <div id="turn-indicator" class="turn-indicator">
                            <span id="turn-text">Ход соперника</span>
                        </div>
                    </div>
                    
                    <div id="myBoard" style="width: 100%"></div>

                    <div id="confirm-move-box" class="confirm-overlay hidden">
                        <button id="confirm-btn" class="btn-round btn-success">✓</button>
                        <button id="cancel-move-btn" class="btn-round btn-danger">✕</button>
                    </div>

                    <div id="takeback-request-box" class="confirm-overlay hidden" style="background: none; box-shadow: none; backdrop-filter: none; padding: 0;">
                        <div class="request-card">
                            <p>Соперник просит отменить последний ход</p>
                            <div class="request-buttons">
                                <button id="takeback-accept" class="btn-round btn-success">✓</button>
                                <button id="takeback-reject" class="btn-round btn-danger">✕</button>
                            </div>
                        </div>
                    </div>

                    <div class="controls">
                        <button id="resign-btn" class="btn btn-danger">Сдаться</button>
                        <button id="takeback-btn" class="btn btn-outline">Просить отмену</button>
                        <button id="exit-btn" class="btn btn-outline">В лобби</button>
                    </div>
                </div>

                <div class="side-panel">
                    <h3>История ходов</h3>
                    <div id="move-list" class="move-list-content"></div>
                    
                    <div class="share-box">
                        <small>Пригласить друга</small>
                        <div class="share-container">
                            <input type="text" id="room-link" readonly>
                            <button id="share-btn" class="btn btn-primary">Поделиться</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="email-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Вход или Регистрация</h3>
                <input type="email" id="email-input" placeholder="Ваша почта" class="input-field" autocomplete="email">
                <input type="password" id="password-input" placeholder="Пароль (мин. 6 символов)" class="input-field" autocomplete="current-password">
                
                <div class="modal-buttons" style="flex-direction: column; gap: 10px;">
                    <button id="login-email-btn" class="btn btn-primary" style="width: 100%;">Войти</button>
                    <button id="register-email-btn" class="btn btn-outline" style="width: 100%;">Создать аккаунт</button>
                    <button id="close-email-modal" class="btn btn-danger" style="width: 100%; background: transparent; color: var(--danger);">Отмена</button>
                </div>
                <p id="email-error" class="error-text hidden" style="color: var(--danger); margin-top: 15px; font-size: 0.9em;"></p>
                <div id="auth-loader" class="loader hidden"></div>
            </div>
        </div>

        <div id="game-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="modal-title" style="margin-top: 0;">Игра окончена</h2>
                <p id="modal-desc" class="modal-desc" style="margin: 20px 0; color: var(--text-secondary);"></p>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <button id="modal-rematch-btn" class="btn btn-primary btn-large">Новая партия (Реванш)</button>
                    <button id="modal-exit-btn" class="btn btn-outline">Выйти в лобби</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
